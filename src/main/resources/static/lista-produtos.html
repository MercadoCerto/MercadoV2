<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Produtos — MercadoCerto</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .preco-unit{font-size:11px;color:var(--ink-soft);margin-top:2px;}
    .badge-melhor{background:#dcfce7;color:#16a34a;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;display:inline-block;margin-top:4px;}
  </style>
</head>
<body>

<header class="header" id="main-header"></header>

<main class="page">
  <div class="container" style="padding-top:24px; padding-bottom:48px;">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; flex-wrap:wrap; gap:12px;">
      <div>
        <h1 class="page-title">Produtos</h1>
        <p class="page-subtitle" id="subtitle-count">Carregando...</p>
      </div>
      <a href="cadastro-produto.html" class="btn btn-primary" id="btn-novo-produto">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Produto
      </a>
    </div>

    <!-- Filtros e Ordenacao -->
    <div style="display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; align-items:center;">
      <input class="form-input" id="filtro-nome" type="text" placeholder="Buscar por nome..." style="max-width:280px;"/>
      <input class="form-input" id="filtro-cat"  type="text" placeholder="Categoria..." style="max-width:180px;"/>
      <select class="form-select" id="filtro-mercado" style="max-width:200px;">
        <option value="">Todos os mercados</option>
      </select>
      <div class="sort-bar" style="margin-left:auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
        <select class="form-select" id="ordenacao" style="max-width:220px;">
          <option value="nome-asc">Nome (A-Z)</option>
          <option value="nome-desc">Nome (Z-A)</option>
          <option value="preco-asc">Menor preço</option>
          <option value="preco-desc">Maior preço</option>
          <option value="preco-unit-asc">Menor preço/unidade</option>
          <option value="categoria-asc">Categoria (A-Z)</option>
          <option value="recente">Mais recente</option>
        </select>
      </div>
    </div>

    <div id="grid-produtos" class="products-grid">
      <div style="grid-column:1/-1;" class="loading-center"><div class="spinner"></div></div>
    </div>

  </div>
</main>

<script src="js/main.js"></script>
<script src="js/header.js"></script>
<script>
  let allProdutos = [];
  let mercadoMap  = {};

  // Esconder botao de novo produto se nao for comercio
  (function() {
    const btn = document.getElementById('btn-novo-produto');
    const u = getUsuarioLogado();
    if (!u || u.tipoConta !== 'COMERCIO') {
      btn.style.display = 'none';
    }
  })();

  // Calcula preço por unidade normalizado em R$/kg ou R$/L
  function calcPrecoUnit(p) {
    if (!p.peso || !p.unidade || p.peso <= 0) return null;
    let fator = 1;
    // Normaliza tudo para kg ou L
    if (p.unidade === 'g') fator = 1000;
    else if (p.unidade === 'ml') fator = 1000;
    else if (p.unidade === 'kg' || p.unidade === 'L') fator = 1;
    else return null; // 'un' não tem comparação por peso
    return p.preco / (p.peso / fator);
  }

  function unidadeBase(unidade) {
    if (unidade === 'kg' || unidade === 'g') return 'kg';
    if (unidade === 'L' || unidade === 'ml') return 'L';
    return null;
  }

  // Identifica o produto com melhor custo-benefício por grupo (marca+categoria+unidadeBase)
  function calcularMelhoresPorUnidade(lista) {
    const grupos = {};
    lista.forEach(p => {
      const ub = unidadeBase(p.unidade);
      if (!ub || !p.peso) return;
      const chave = `${(p.categoria||'').toLowerCase()}|${(p.marca||'').toLowerCase()}|${ub}`;
      if (!grupos[chave]) grupos[chave] = [];
      grupos[chave].push(p);
    });

    const melhores = new Set();
    Object.values(grupos).forEach(grupo => {
      if (grupo.length < 2) return; // só marca se houver ao menos 2 para comparar
      let melhor = grupo[0];
      let melhorPU = calcPrecoUnit(melhor);
      grupo.forEach(p => {
        const pu = calcPrecoUnit(p);
        if (pu !== null && melhorPU !== null && pu < melhorPU) {
          melhor = p;
          melhorPU = pu;
        }
      });
      melhores.add(melhor.idProduto);
    });
    return melhores;
  }

  async function carregar() {
    const grid = document.getElementById('grid-produtos');
    grid.innerHTML = `<div style="grid-column:1/-1;" class="loading-center"><div class="spinner"></div></div>`;

    try {
      const [resProd, resMerc] = await Promise.all([
        fetch(`${API}/api/produtos`),
        fetch(`${API}/api/mercados`)
      ]);
      allProdutos = await resProd.json();
      const mercados = await resMerc.json();

      mercados.forEach(m => { mercadoMap[m.idMercado] = m.nomeMercado; });

      const sel = document.getElementById('filtro-mercado');
      mercados.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.idMercado;
        opt.textContent = m.nomeMercado;
        sel.appendChild(opt);
      });

      filtrar();
    } catch {
      grid.innerHTML = `<div style="grid-column:1/-1;" class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div class="empty-state-title">Erro ao carregar</div>
        <div class="empty-state-text">Verifique se o servidor está rodando.</div>
      </div>`;
    }
  }

  function ordenarProdutos(lista) {
    const criterio = document.getElementById('ordenacao').value;
    const sorted = [...lista];

    switch (criterio) {
      case 'nome-asc':
        sorted.sort((a, b) => (a.nomeProduto || '').localeCompare(b.nomeProduto || ''));
        break;
      case 'nome-desc':
        sorted.sort((a, b) => (b.nomeProduto || '').localeCompare(a.nomeProduto || ''));
        break;
      case 'preco-asc':
        sorted.sort((a, b) => (a.preco || 0) - (b.preco || 0));
        break;
      case 'preco-desc':
        sorted.sort((a, b) => (b.preco || 0) - (a.preco || 0));
        break;
      case 'preco-unit-asc':
        sorted.sort((a, b) => {
          const pa = calcPrecoUnit(a), pb = calcPrecoUnit(b);
          if (pa === null && pb === null) return 0;
          if (pa === null) return 1;
          if (pb === null) return -1;
          return pa - pb;
        });
        break;
      case 'categoria-asc':
        sorted.sort((a, b) => (a.categoria || '').localeCompare(b.categoria || ''));
        break;
      case 'recente':
        sorted.sort((a, b) => (b.idProduto || 0) - (a.idProduto || 0));
        break;
    }
    return sorted;
  }

  function renderProdutos(lista) {
    const grid = document.getElementById('grid-produtos');
    document.getElementById('subtitle-count').textContent =
      `${lista.length} produto${lista.length !== 1 ? 's' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

    if (lista.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1;" class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-title">Nenhum produto encontrado</div>
        <div class="empty-state-text">Tente ajustar os filtros ou <a href="cadastro-produto.html" style="color:var(--green)">cadastre um novo produto</a>.</div>
      </div>`;
      return;
    }

    const melhores = calcularMelhoresPorUnidade(lista);

    grid.innerHTML = '';
    lista.forEach(p => {
      const nomeMercado = mercadoMap[p.idMercado] || 'Não informado';
      const imgUrl = p.imagem ? `${API}/uploads/${p.imagem}` : null;
      const precoUnit = calcPrecoUnit(p);
      const ub = unidadeBase(p.unidade);
      const isMelhor = melhores.has(p.idProduto);

      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        ${imgUrl
          ? `<div class="product-card-img"><img src="${imgUrl}" alt="${p.nomeProduto}" loading="lazy"/></div>`
          : `<div class="product-card-img-placeholder">
               <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".35"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
               <span>Sem imagem</span>
             </div>`}
        <div class="product-card-body">
          <div class="product-card-name">${p.nomeProduto}</div>
          <div class="product-card-meta">
            <span class="badge badge-gray">${p.categoria || '—'}</span>
            <span style="color:var(--ink-faint)">•</span>
            <span>${p.marca || '—'}</span>
          </div>
          ${p.peso ? `<div class="product-card-meta" style="margin-top:2px;">⚖️ ${p.peso}${p.unidade || ''}</div>` : ''}
          <div class="product-card-meta" style="margin-top:2px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            ${nomeMercado}
          </div>
          ${p.validade ? `<div class="product-card-meta" style="margin-top:2px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Val: ${p.validade}
          </div>` : ''}
          ${p.codigoBarras ? `<div class="product-card-meta" style="font-size:11px; color:var(--ink-faint);"># ${p.codigoBarras}</div>` : ''}
          <div class="product-card-price">R$ ${(p.preco || 0).toFixed(2)}</div>
          ${precoUnit !== null ? `<div class="preco-unit">≈ R$ ${precoUnit.toFixed(2)}/${ub}</div>` : ''}
          ${isMelhor ? `<span class="badge-melhor">✓ Melhor custo por ${ub}</span>` : ''}
          <a href="comparar.html?produto=${p.idProduto}" class="btn btn-secondary" style="font-size:11px;padding:5px 10px;margin-top:8px;">Comparar preços</a>
        </div>`;
      grid.appendChild(card);
    });
  }

  function filtrar() {
    const nome    = document.getElementById('filtro-nome').value.toLowerCase();
    const cat     = document.getElementById('filtro-cat').value.toLowerCase();
    const mercado = document.getElementById('filtro-mercado').value;

    const filtrado = allProdutos.filter(p =>
      (!nome    || p.nomeProduto?.toLowerCase().includes(nome)) &&
      (!cat     || p.categoria?.toLowerCase().includes(cat)) &&
      (!mercado || String(p.idMercado) === mercado)
    );
    renderProdutos(ordenarProdutos(filtrado));
  }

  document.getElementById('filtro-nome').addEventListener('input', filtrar);
  document.getElementById('filtro-cat').addEventListener('input', filtrar);
  document.getElementById('filtro-mercado').addEventListener('change', filtrar);
  document.getElementById('ordenacao').addEventListener('change', filtrar);

  carregar();
</script>
</body>
</html>
