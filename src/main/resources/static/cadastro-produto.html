<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cadastrar Produto — MercadoCerto</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="header" id="main-header"></header>

<main class="page">
  <div class="container-narrow" style="padding-top:24px; padding-bottom:48px;">

    <div style="margin-bottom:24px;">
      <a href="lista-produtos.html" class="btn btn-ghost" style="margin-bottom:16px; display:inline-flex;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </a>
      <h1 class="page-title">Cadastrar Produto</h1>
      <p class="page-subtitle">Adicione um novo produto à plataforma</p>
    </div>

    <div class="card">
      <form id="form-produto" enctype="multipart/form-data">

        <div class="form-group">
          <label class="form-label" for="nome">Nome do Produto <span class="req">*</span></label>
          <input class="form-input" id="nome" type="text" placeholder="Ex: Arroz Integral 5kg" required/>
        </div>

        <div class="row">
          <div class="form-group">
            <label class="form-label" for="marca">Marca <span class="req">*</span></label>
            <input class="form-input" id="marca" type="text" placeholder="Ex: Tio João" required/>
          </div>
          <div class="form-group">
            <label class="form-label" for="categoria">Categoria <span class="req">*</span></label>
            <input class="form-input" id="categoria" type="text" placeholder="Ex: Grãos" required/>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label class="form-label" for="preco">Preço (R$) <span class="req">*</span></label>
            <input class="form-input" id="preco" type="number" step="0.01" min="0" placeholder="0,00" required/>
          </div>
          <div class="form-group">
            <label class="form-label" for="validade">Validade <span class="req">*</span></label>
            <input class="form-input" id="validade" type="date" required/>
          </div>
        </div>

        <!-- Tipo de medida -->
        <div class="form-group">
          <label class="form-label" for="tipoMedida">Como o produto é medido? <span class="req">*</span></label>
          <select class="form-select" id="tipoMedida" required>
            <option value="">Selecione…</option>
            <option value="PESO">Peso (kg / g)</option>
            <option value="VOLUME">Volume (L / ml)</option>
            <option value="UNIDADE">Unidade (itens contáveis)</option>
            <option value="PACK">Pack (N itens × conteúdo)</option>
          </select>
          <small id="hint-tipo" style="color:var(--ink-soft);font-size:11px;display:block;margin-top:4px;">
            Escolha o tipo para preencher os campos corretos.
          </small>
        </div>

        <!-- PESO / VOLUME: peso + unidade -->
        <div class="form-group" id="grp-peso" style="display:none;">
          <label class="form-label" for="peso"><span id="lbl-peso">Peso</span> da embalagem <span class="req">*</span></label>
          <div style="display:flex;gap:8px;">
            <input class="form-input" id="peso" type="number" step="0.001" min="0" placeholder="Ex: 5" style="flex:1"/>
            <select class="form-select" id="unidade" style="width:90px;"></select>
          </div>
        </div>

        <!-- UNIDADE: quantidade simples -->
        <div class="form-group" id="grp-quantidade-simples" style="display:none;">
          <label class="form-label" for="qtdSimples">Quantidade de itens na embalagem <span class="req">*</span></label>
          <input class="form-input" id="qtdSimples" type="number" min="1" step="1" placeholder="Ex: 12 (para uma cartela de 12 ovos)"/>
        </div>

        <!-- PACK: quantidade × peso unitário -->
        <div id="grp-pack" style="display:none;">
          <div class="row">
            <div class="form-group">
              <label class="form-label" for="qtdPack">Itens no pack <span class="req">*</span></label>
              <input class="form-input" id="qtdPack" type="number" min="1" step="1" placeholder="Ex: 6"/>
            </div>
            <div class="form-group">
              <label class="form-label" for="pesoPack">Conteúdo por item <span class="req">*</span></label>
              <div style="display:flex;gap:8px;">
                <input class="form-input" id="pesoPack" type="number" step="0.001" min="0" placeholder="Ex: 500" style="flex:1"/>
                <select class="form-select" id="unidadePack" style="width:90px;"></select>
              </div>
            </div>
          </div>
          <small style="color:var(--ink-soft);font-size:11px;display:block;margin-top:-8px;margin-bottom:18px;">
            Ex.: pack de 6 garrafas de 500 ml → 6 × 500 ml.
          </small>
        </div>

        <div class="form-group">
          <label class="form-label" for="codigoBarras">Código de Barras <span class="req">*</span></label>
          <input class="form-input" id="codigoBarras" type="text" placeholder="Ex: 7891234567890" required/>
        </div>

        <div class="form-group">
          <label class="form-label" for="mercado">Mercado <span class="req">*</span></label>
          <select class="form-select" id="mercado" required>
            <option value="">Carregando mercados...</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Imagem do Produto</label>
          <label class="form-file-label" for="imagem" id="file-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span id="file-name">Clique para selecionar uma imagem</span>
          </label>
          <input type="file" id="imagem" accept="image/*"/>
        </div>

        <!-- Preview da imagem -->
        <div id="img-preview-box" style="display:none; margin-bottom:18px;">
          <img id="img-preview" style="max-height:180px; max-width:100%; object-fit:contain; border-radius:var(--radius-sm); border:1px solid var(--ink-faint); background:var(--surface-2); display:block; margin:0 auto;"/>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-submit">
          Cadastrar Produto
        </button>

      </form>
    </div>

  </div>
</main>

<script src="js/main.js"></script>
<script src="js/header.js"></script>
<script>
  if (!requireComercio()) { throw new Error('Acesso negado'); }

  document.getElementById('imagem').addEventListener('change', function () {
    const file = this.files[0];
    if (file) {
      if (!file.type.startsWith('image/')) {
        toast('Selecione um arquivo de imagem', 'error');
        this.value = '';
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        toast('Imagem muito grande (max 5MB)', 'error');
        this.value = '';
        return;
      }
      document.getElementById('file-name').textContent = file.name;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('img-preview').src = e.target.result;
        document.getElementById('img-preview-box').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  async function carregarMercados() {
    const sel = document.getElementById('mercado');
    try {
      const res = await fetch(`${API}/api/mercados`);
      const mercados = await res.json();
      sel.innerHTML = '<option value="">Selecione um mercado</option>';
      mercados.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.idMercado;
        opt.textContent = m.nomeMercado;
        sel.appendChild(opt);
      });
    } catch {
      sel.innerHTML = '<option value="">Erro ao carregar mercados</option>';
    }
  }

  // ── Mostra/esconde campos conforme tipo de medida ─────────────
  const UNIDADES_POR_TIPO = {
    PESO:   [['kg','kg'],['g','g']],
    VOLUME: [['L','L'],['ml','ml']],
    PACK:   [['kg','kg'],['g','g'],['L','L'],['ml','ml']],
  };

  function popularUnidades(selectEl, tipo) {
    selectEl.innerHTML = '';
    (UNIDADES_POR_TIPO[tipo] || []).forEach(([v, label]) => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = label;
      selectEl.appendChild(opt);
    });
  }

  document.getElementById('tipoMedida').addEventListener('change', (e) => {
    const tipo = e.target.value;
    const grpPeso = document.getElementById('grp-peso');
    const grpQtd  = document.getElementById('grp-quantidade-simples');
    const grpPack = document.getElementById('grp-pack');
    const lblPeso = document.getElementById('lbl-peso');

    grpPeso.style.display = (tipo === 'PESO' || tipo === 'VOLUME') ? '' : 'none';
    grpQtd.style.display  = (tipo === 'UNIDADE') ? '' : 'none';
    grpPack.style.display = (tipo === 'PACK')    ? '' : 'none';

    if (tipo === 'PESO' || tipo === 'VOLUME') {
      lblPeso.textContent = (tipo === 'PESO') ? 'Peso' : 'Volume';
      popularUnidades(document.getElementById('unidade'), tipo);
    }
    if (tipo === 'PACK') {
      popularUnidades(document.getElementById('unidadePack'), 'PACK');
    }
  });

  document.getElementById('form-produto').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');

    const tipoMedida = document.getElementById('tipoMedida').value;
    if (!tipoMedida) { toast('Selecione o tipo de medida', 'error'); return; }

    let quantidade = null, peso = null, unidade = null;
    if (tipoMedida === 'PESO' || tipoMedida === 'VOLUME') {
      peso    = parseFloat(document.getElementById('peso').value);
      unidade = document.getElementById('unidade').value;
      if (!peso || peso <= 0 || !unidade) {
        toast('Informe o peso/volume e a unidade', 'error'); return;
      }
    } else if (tipoMedida === 'UNIDADE') {
      quantidade = parseInt(document.getElementById('qtdSimples').value);
      unidade = 'un';
      if (!quantidade || quantidade <= 0) {
        toast('Informe a quantidade de itens', 'error'); return;
      }
    } else if (tipoMedida === 'PACK') {
      quantidade = parseInt(document.getElementById('qtdPack').value);
      peso       = parseFloat(document.getElementById('pesoPack').value);
      unidade    = document.getElementById('unidadePack').value;
      if (!quantidade || quantidade <= 0 || !peso || peso <= 0 || !unidade) {
        toast('Preencha itens, conteúdo e unidade do pack', 'error'); return;
      }
    }

    const produto = {
      nomeProduto:  document.getElementById('nome').value.trim(),
      marca:        document.getElementById('marca').value.trim(),
      categoria:    document.getElementById('categoria').value.trim(),
      validade:     document.getElementById('validade').value,
      codigoBarras: document.getElementById('codigoBarras').value.trim(),
      preco:        parseFloat(document.getElementById('preco').value),
      tipoMedida,
      quantidade,
      peso,
      unidade,
    };

    const idMercado = parseInt(document.getElementById('mercado').value);
    if (!idMercado) { toast('Selecione um mercado', 'error'); return; }

    const imagem = document.getElementById('imagem').files[0];
    const formData = new FormData();
    formData.append('produto', JSON.stringify(produto));
    formData.append('idMercado', idMercado);
    if (imagem) formData.append('imagem', imagem);

    setLoading(btn, true);
    try {
      const res = await fetch(`${API}/api/produtos/cadastrar`, {
        method: 'POST',
        body: formData
      });

      if (res.ok) {
        toast('Produto cadastrado com sucesso!', 'success');
        document.getElementById('form-produto').reset();
        document.getElementById('img-preview-box').style.display = 'none';
        document.getElementById('file-name').textContent = 'Clique para selecionar uma imagem';
        document.getElementById('grp-peso').style.display = 'none';
        document.getElementById('grp-quantidade-simples').style.display = 'none';
        document.getElementById('grp-pack').style.display = 'none';
      } else {
        const txt = await res.text();
        toast('Erro: ' + txt, 'error');
      }
    } catch {
      toast('Erro de conexão', 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  carregarMercados();
</script>
</body>
</html>
